# Example top-level registry.
# Real path: ~/.config/abletonctl/config.toml
#
# Maps each artist namespace to its root directory on disk. Roots don't need
# to share a common parent - they can live on different drives.

[artists]
artist-name = "/Users/rca/Music/artist-name"
# other-artist = "/Volumes/External/other-artist"

# Optional: back up the local Ableton User Library - presets, samples, M4L
# devices, templates. It's machine-level, not artist-specific, so it's a
# single section rather than a map. `path` defaults to
# ~/Music/Ableton/User Library (Ableton's own default) if omitted.
[library]
remote = "r2:my-bucket/user-library"
# path = "/Users/rca/Music/Ableton/User Library"
