# Example config file.
# Real path: ~/.config/abletonctl/config.toml
#
# Points abletonctl at your Ableton Live workspace: a directory full of
# Ableton Projects, and a directory WIP demo bounces land in. Each has its
# own rclone remote it backs up to - the remote is the exact destination,
# not a parent directory.

projects_dir = "/path/to/your/projects"
demos_dir = "/path/to/your/demos"

projects_remote = "r2:my-bucket/projects"
demos_remote = "gdrive:my-demos"
